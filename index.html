<!DOCTYPE html>
<html>
<head>
  <title>PixGen v1.4 - Character Creator</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    canvas {
      border: 2px solid white;
      image-rendering: pixelated;
      margin-top: 20px;
    }

    select, button {
      margin: 10px;
      padding: 5px 10px;
      font-weight: bold;
    }

    #controls div {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>PixGen v1.4 🎨</h1>

  <!-- Step 1: Canvas Size -->
  <div id="step1">
    <h2>Step 1: Select Canvas Size</h2>
    <select id="canvasSizeSelect">
      <option value="8">8 x 8</option>
      <option value="16" selected>16 x 16</option>
      <option value="32">32 x 32</option>
      <option value="64">64 x 64</option>
      <option value="128">128 x 128</option>
    </select>
    <br>
    <button onclick="nextStep(1)">Next</button>
  </div>

  <!-- Step 2: Body Selection -->
  <div id="step2" style="display:none;">
    <h2>Step 2: Choose Body Type</h2>
    <select id="bodySelect"></select>
    <br>
    <button onclick="nextStep(2)">Next</button>
  </div>

  <!-- Step 3: Customization -->
  <div id="step3" style="display:none;">
    <h2>Step 3: Customize Your Character</h2>
    <label>Hair:</label>
    <select id="hairSelect"></select>
    <label>Eyes:</label>
    <select id="eyesSelect"></select>
    <label>Top:</label>
    <select id="topSelect"></select>
    <label>Pants:</label>
    <select id="pantsSelect"></select>
    <label>Accessories:</label>
    <select id="accessoriesSelect"></select>
    <br>
    <button onclick="drawCharacter()">Draw Character</button>
  </div>

  <canvas id="pixelCanvas" width="256" height="256"></canvas>
  <br>
  <button onclick="downloadCharacter()">Download PNG</button>

  <script>
    // Function to move to the next step
    function nextStep(currentStep) {
      document.getElementById(`step${currentStep}`).style.display = "none";
      document.getElementById(`step${currentStep+1}`).style.display = "block";
    }

    // Assets for each layer
    const assets = {
      body: ['assets/body/body1.png','assets/body/body2.png'],
      pants: ['assets/pants/pants1.png','assets/pants/pants2.png'],
      top: ['assets/top/top1.png','assets/top/top2.png'],
      hair: ['assets/hair/hair1.png','assets/hair/hair2.png'],
      eyes: ['assets/eyes/eyes1.png','assets/eyes/eyes2.png'],
      accessories: ['assets/accessories/acc1.png','assets/accessories/acc2.png']
    };

    // Select elements
    const selects = {
      body: document.getElementById('bodySelect'),
      pants: document.getElementById('pantsSelect'),
      top: document.getElementById('topSelect'),
      hair: document.getElementById('hairSelect'),
      eyes: document.getElementById('eyesSelect'),
      accessories: document.getElementById('accessoriesSelect')
    };

    // Populate dropdowns
    for (let layer in assets) {
      assets[layer].forEach((path, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.text = `${layer} ${index+1}`;
        selects[layer].appendChild(option);
      });
    }

    // Draw the character
    function drawCharacter() {
      const canvas = document.getElementById('pixelCanvas');
      const ctx = canvas.getContext('2d');

      const size = parseInt(document.getElementById('canvasSizeSelect').value);
      canvas.width = size * 16;
      canvas.height = size * 16;
      ctx.clearRect(0,0,canvas.width,canvas.height);

      const selectedIndices = {
        body: selects.body.value,
        pants: selects.pants.value,
        top: selects.top.value,
        hair: selects.hair.value,
        eyes: selects.eyes.value,
        accessories: selects.accessories.value
      };

      const layers = ['body','pants','top','hair','eyes','accessories'];

      layers.forEach(layer => {
        const img = new Image();
        img.src = assets[layer][selectedIndices[layer]];
        img.onload = () => {
          ctx.drawImage(img,0,0,canvas.width,canvas.height);
        }
      });
    }

    // Download canvas as PNG
    function downloadCharacter() {
      const canvas = document.getElementById('pixelCanvas');
      const link = document.createElement('a');
      link.download = 'pixgen_character.png';
      link.href = canvas.toDataURL();
      link.click();
    }

    // Draw default character on load
    window.onload = function() {
      drawCharacter();
    };
  </script>
</body>
</html>
