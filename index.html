<!DOCTYPE html>
<html>
<head>
  <title>PIXGEN v2 - Character Creator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #0b1d3a; /* Navy Blue */
      color: white;
      font-family: 'Roboto Mono', monospace;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #00ffff; /* Neon Cyan */
      font-size: 3em;
      font-weight: 900;
      margin: 20px 0;
      text-align: center;
      letter-spacing: 2px;
    }

    #canvasContainer {
      background: white;
      border: 6px solid black;
      width: 300px;
      height: 300px;
      margin-bottom: 20px;
    }

    canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .menu-row {
      display: flex;
      align-items: center;
      margin: 5px 0;
    }

    .menu-row label {
      width: 80px;
      font-weight: 900;
      font-size: 1em;
      margin-right: 5px;
    }

    .menu-row .option-btn {
      width: 35px;
      height: 35px;
      background: white;
      border: 3px solid black;
      margin: 0 2px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #customizationMenu {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 360px;
      padding-bottom: 20px;
    }

    button#drawBtn, button#downloadBtn {
      margin: 10px;
      padding: 10px 20px;
      background: #00ffff;
      border: 3px solid black;
      font-weight: 900;
      font-size: 1em;
      cursor: pointer;
    }

    @media (max-width: 400px) {
      #canvasContainer {
        width: 90vw;
        height: 90vw;
      }
      .menu-row label {
        width: 60px;
        font-size: 0.9em;
      }
      .menu-row .option-btn {
        width: 30px;
        height: 30px;
      }
    }
  </style>
</head>
<body>

  <h1>PIXGEN</h1>

  <div id="canvasContainer">
    <canvas id="pixelCanvas" width="256" height="256"></canvas>
  </div>

  <div id="customizationMenu">
    <div class="menu-row" id="hairRow">
      <label>HAIR</label>
      <div class="option-btn" onclick="selectOption('hair',0)"></div>
      <div class="option-btn" onclick="selectOption('hair',1)"></div>
      <div class="option-btn" onclick="selectOption('hair',2)"></div>
      <div class="option-btn" onclick="selectOption('hair',3)"></div>
      <div class="option-btn" onclick="selectOption('hair',4)"></div>
      <div class="option-btn" onclick="selectOption('hair',5)"></div>
      <div class="option-btn" onclick="selectOption('hair',6)"></div>
    </div>

    <div class="menu-row" id="eyesRow">
      <label>EYES</label>
      <div class="option-btn" onclick="selectOption('eyes',0)"></div>
      <div class="option-btn" onclick="selectOption('eyes',1)"></div>
      <div class="option-btn" onclick="selectOption('eyes',2)"></div>
      <div class="option-btn" onclick="selectOption('eyes',3)"></div>
      <div class="option-btn" onclick="selectOption('eyes',4)"></div>
      <div class="option-btn" onclick="selectOption('eyes',5)"></div>
      <div class="option-btn" onclick="selectOption('eyes',6)"></div>
    </div>

    <div class="menu-row" id="topRow">
      <label>TOP</label>
      <div class="option-btn" onclick="selectOption('top',0)"></div>
      <div class="option-btn" onclick="selectOption('top',1)"></div>
      <div class="option-btn" onclick="selectOption('top',2)"></div>
      <div class="option-btn" onclick="selectOption('top',3)"></div>
      <div class="option-btn" onclick="selectOption('top',4)"></div>
      <div class="option-btn" onclick="selectOption('top',5)"></div>
      <div class="option-btn" onclick="selectOption('top',6)"></div>
    </div>

    <div class="menu-row" id="pantsRow">
      <label>PANTS</label>
      <div class="option-btn" onclick="selectOption('pants',0)"></div>
      <div class="option-btn" onclick="selectOption('pants',1)"></div>
      <div class="option-btn" onclick="selectOption('pants',2)"></div>
      <div class="option-btn" onclick="selectOption('pants',3)"></div>
      <div class="option-btn" onclick="selectOption('pants',4)"></div>
      <div class="option-btn" onclick="selectOption('pants',5)"></div>
      <div class="option-btn" onclick="selectOption('pants',6)"></div>
    </div>

    <div class="menu-row" id="etcRow">
      <label>ETC</label>
      <div class="option-btn" onclick="selectOption('accessories',0)"></div>
      <div class="option-btn" onclick="selectOption('accessories',1)"></div>
      <div class="option-btn" onclick="selectOption('accessories',2)"></div>
      <div class="option-btn" onclick="selectOption('accessories',3)"></div>
      <div class="option-btn" onclick="selectOption('accessories',4)"></div>
      <div class="option-btn" onclick="selectOption('accessories',5)"></div>
      <div class="option-btn" onclick="selectOption('accessories',6)"></div>
    </div>

    <button id="drawBtn" onclick="drawCharacter()">DRAW CHARACTER</button>
    <button id="downloadBtn" onclick="downloadCharacter()">DOWNLOAD</button>

  </div>

  <script>
    // Selected indices
    const selected = {
      hair: 0,
      eyes: 0,
      top: 0,
      pants: 0,
      accessories: 0
    };

    // Assets (replace with your actual paths)
    const assets = {
      hair: ['assets/hair/hair1.png','assets/hair/hair2.png','assets/hair/hair3.png','assets/hair/hair4.png','assets/hair/hair5.png','assets/hair/hair6.png','assets/hair/hair7.png'],
      eyes: ['assets/eyes/eyes1.png','assets/eyes/eyes2.png','assets/eyes/eyes3.png','assets/eyes/eyes4.png','assets/eyes/eyes5.png','assets/eyes/eyes6.png','assets/eyes/eyes7.png'],
      top: ['assets/top/top1.png','assets/top/top2.png','assets/top/top3.png','assets/top/top4.png','assets/top/top5.png','assets/top/top6.png','assets/top/top7.png'],
      pants: ['assets/pants/pants1.png','assets/pants/pants2.png','assets/pants/pants3.png','assets/pants/pants4.png','assets/pants/pants5.png','assets/pants/pants6.png','assets/pants/pants7.png'],
      accessories: ['assets/accessories/acc1.png','assets/accessories/acc2.png','assets/accessories/acc3.png','assets/accessories/acc4.png','assets/accessories/acc5.png','assets/accessories/acc6.png','assets/accessories/acc7.png']
    };

    function selectOption(layer,index){
      selected[layer] = index;
      drawCharacter();
    }

    function drawCharacter(){
      const canvas = document.getElementById('pixelCanvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0,0,canvas.width,canvas.height);

      // Draw layers in order: body assumed default 0
      const order = ['hair','eyes','top','pants','accessories'];
      order.forEach(layer=>{
        const img = new Image();
        img.src = assets[layer][selected[layer]];
        img.onload = ()=>{
          ctx.drawImage(img,0,0,canvas.width,canvas.height);
        };
      });
    }

    function downloadCharacter(){
      const canvas = document.getElementById('pixelCanvas');
      const link = document.createElement('a');
      link.download = 'pixgen_character.png';
      link.href = canvas.toDataURL();
      link.click();
    }

    // Initial draw
    window.onload = drawCharacter;
  </script>

</body>
</html>
