<!DOCTYPE html>
<html>
<head>
  <title>PIXGEN v2.7 - Step Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #0b1d3a;
      color: white;
      font-family: 'Roboto Mono', monospace;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #00ffff;
      font-size: 3em;
      font-weight: 900;
      margin: 20px 0;
      text-align: center;
      letter-spacing: 2px;
    }

    .step { width: 100%; display: none; flex-direction: column; align-items: center; margin-bottom: 20px; }
    .step.active { display: flex; }

    select, button {
      margin: 10px;
      padding: 10px 20px;
      font-weight: 900;
      font-size: 1em;
      cursor: pointer;
      border: 3px solid black;
      background: white;
      color: black;
    }

    #canvasContainer {
      background: transparent;
      border: 6px solid black;
      width: 300px;
      height: 300px;
      margin: 20px 0;
      position: relative;
    }

    canvas { width: 100%; height: 100%; image-rendering: pixelated; }

    .menu-row { display: flex; align-items: center; margin: 5px 0; }

    .menu-row label { width: 80px; font-weight: 900; font-size: 1em; margin-right: 5px; }

    .options-container {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding: 5px;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
    }

    .option-btn {
      min-width: 50px;
      height: 50px;
      background: white;
      border: 3px solid black;
      flex-shrink: 0;
      cursor: pointer;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .option-btn img {
      width: 80%;
      height: 80%;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .option-btn.selected {
      border: 3px solid #00ffff;
      box-shadow: 0 0 10px #00ffff;
    }

    .scroll-btn {
      background: #00ffff;
      border: 3px solid black;
      font-weight: bold;
      cursor: pointer;
      height: 50px;
      width: 40px;
      margin: 0 3px;
    }

    #customizationMenu {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 360px;
      padding-bottom: 20px;
    }

    button#drawBtn, button#downloadBtn, button#randomizeBtn { background: #00ffff; color: black; }

    @media (max-width: 400px) {
      #canvasContainer { width: 90vw; height: 90vw; }
      .menu-row label { width: 60px; font-size: 0.9em; }
      .option-btn { width: 30px; height: 30px; }
      .scroll-btn { height: 30px; width: 30px; font-size: 0.9em; }
    }
  </style>
</head>
<body>

<h1>PIXGEN</h1>

<!-- Step 1: Canvas Size -->
<div class="step active" id="step1">
  <h2>Select Canvas Size</h2>
  <select id="canvasSizeSelect">
    <option value="8">8 x 8</option>
    <option value="16" selected>16 x 16</option>
    <option value="32">32 x 32</option>
    <option value="64">64 x 64</option>
    <option value="128">128 x 128</option>
  </select>
  <br>
  <button onclick="nextStep(1)">Next</button>
</div>

<!-- Step 2: Body Type -->
<div class="step" id="step2">
  <h2>Select Body Type</h2>
  <select id="bodySelect">
    <option value="0">Body 1</option>
    <option value="1">Body 2</option>
    <option value="2">Body 3</option>
  </select>
  <br>
  <button onclick="nextStep(2)">Next</button>
</div>

<!-- Step 3: Customization -->
<div class="step" id="step3">
  <div id="canvasContainer">
    <canvas id="pixelCanvas" width="256" height="256"></canvas>
  </div>

  <div id="customizationMenu">

    <div style="margin:10px;">
      <button id="randomizeBtn" onclick="randomizeCharacter()">RANDOMIZE</button>
      <label style="margin-left:10px;"><input type="checkbox" id="gridToggle" checked> Show Grid</label>
    </div>

    <!-- HAIR -->
    <div class="menu-row">
      <label>HAIR</label>
      <button class="scroll-btn" onclick="scrollLeft('hairRow')">◀</button>
      <div class="options-container" id="hairRow"></div>
      <button class="scroll-btn" onclick="scrollRight('hairRow')">▶</button>
    </div>

    <!-- EYES -->
    <div class="menu-row">
      <label>EYES</label>
      <button class="scroll-btn" onclick="scrollLeft('eyesRow')">◀</button>
      <div class="options-container" id="eyesRow"></div>
      <button class="scroll-btn" onclick="scrollRight('eyesRow')">▶</button>
    </div>

    <!-- TOP -->
    <div class="menu-row">
      <label>TOP</label>
      <button class="scroll-btn" onclick="scrollLeft('topRow')">◀</button>
      <div class="options-container" id="topRow"></div>
      <button class="scroll-btn" onclick="scrollRight('topRow')">▶</button>
    </div>

    <!-- PANTS -->
    <div class="menu-row">
      <label>PANTS</label>
      <button class="scroll-btn" onclick="scrollLeft('pantsRow')">◀</button>
      <div class="options-container" id="pantsRow"></div>
      <button class="scroll-btn" onclick="scrollRight('pantsRow')">▶</button>
    </div>

    <!-- ETC / Accessories -->
    <div class="menu-row">
      <label>ETC</label>
      <button class="scroll-btn" onclick="scrollLeft('accessoriesRow')">◀</button>
      <div class="options-container" id="accessoriesRow"></div>
      <button class="scroll-btn" onclick="scrollRight('accessoriesRow')">▶</button>
    </div>

  </div>

  <button id="drawBtn" onclick="drawCharacter()">DRAW CHARACTER</button>
  <button id="downloadBtn" onclick="downloadCharacter()">DOWNLOAD</button>

</div>

<script>
  // Example assets (replace with your images)
  const assets = {
    hair: ["assets/hair1.png","assets/hair2.png","assets/hair3.png","assets/hair4.png","assets/hair5.png","assets/hair6.png","assets/hair7.png","assets/hair8.png"],
    eyes: ["assets/eyes1.png","assets/eyes2.png","assets/eyes3.png","assets/eyes4.png","assets/eyes5.png","assets/eyes6.png","assets/eyes7.png"],
    top: ["assets/top1.png","assets/top2.png","assets/top3.png"],
    pants: ["assets/pants1.png","assets/pants2.png"],
    accessories: ["assets/acc1.png","assets/acc2.png","assets/acc3.png"]
  };

  let selected = { hair:0, eyes:0, top:0, pants:0, accessories:0 };

  function nextStep(step){
    document.getElementById('step'+step).classList.remove('active');
    document.getElementById('step'+(step+1)).classList.add('active');
  }

  function updateRowHighlight(layer){
    const row = document.getElementById(layer + "Row");
    row.querySelectorAll('.option-btn').forEach((btn,i)=>{
      btn.classList.toggle('selected', i === selected[layer]);
    });
  }

  function selectOption(layer,index){
    selected[layer] = index;
    updateRowHighlight(layer);
    drawCharacter();
  }

  function randomizeCharacter(){
    Object.keys(assets).forEach(layer=>{
      selected[layer] = Math.floor(Math.random()*assets[layer].length);
      updateRowHighlight(layer);
    });
    drawCharacter();
  }

  function drawCharacter(){
    const canvas = document.getElementById('pixelCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    Object.keys(selected).forEach(layer=>{
      const imgIndex = selected[layer];
      if(assets[layer][imgIndex]){
        const img = new Image();
        img.src = assets[layer][imgIndex];
        img.onload = ()=>ctx.drawImage(img,0,0,canvas.width,canvas.height);
      }
    });
  }

  function downloadCharacter(){
    const canvas = document.getElementById('pixelCanvas');
    const link = document.createElement('a');
    link.download = 'pixgen_character.png';
    link.href = canvas.toDataURL();
    link.click();
  }

  function generateOptions(layer){
    const row = document.getElementById(layer + "Row");
    row.innerHTML = "";
    const minBoxes = 7; // always show 7 boxes
    const total = Math.max(assets[layer].length, minBoxes);

    for(let i=0;i<total;i++){
      const btn = document.createElement('div');
      btn.classList.add('option-btn');
      if(i<assets[layer].length){
        const img = document.createElement('img');
        img.src = assets[layer][i];
        btn.appendChild(img);
      }
      btn.onclick = ()=>selectOption(layer,i);
      row.appendChild(btn);
    }
  }

  function scrollLeft(id){ document.getElementById(id).scrollBy({ left:-120, behavior:"smooth" }); }
  function scrollRight(id){ document.getElementById(id).scrollBy({ left:120, behavior:"smooth" }); }

  window.onload = function(){
    generateOptions("hair");
    generateOptions("eyes");
    generateOptions("top");
    generateOptions("pants");
    generateOptions("accessories");
    Object.keys(selected).forEach(layer=>updateRowHighlight(layer));
    drawCharacter();
  };
</script>

</body>
</html>
