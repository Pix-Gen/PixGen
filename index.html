<!DOCTYPE html>
<html>
<head>
  <title>PIXGEN v2.3 - Step Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #0b1d3a;
      color: white;
      font-family: 'Roboto Mono', monospace;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #00ffff;
      font-size: 3em;
      font-weight: 900;
      margin: 20px 0;
      text-align: center;
      letter-spacing: 2px;
    }

    .step {
      width: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }

    .step.active {
      display: flex;
    }

    select, button {
      margin: 10px;
      padding: 10px 20px;
      font-weight: 900;
      font-size: 1em;
      cursor: pointer;
      border: 3px solid black;
      background: white;
      color: black;
    }

    #canvasContainer {
      background: transparent;
      border: 6px solid black;
      width: 300px;
      height: 300px;
      margin: 20px 0;
      position: relative;
    }

    canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .menu-row {
      display: flex;
      align-items: center;
      margin: 5px 0;
    }

    .menu-row label {
      width: 80px;
      font-weight: 900;
      font-size: 1em;
      margin-right: 5px;
    }

    .menu-row .option-btn {
      width: 35px;
      height: 35px;
      background: white;
      border: 3px solid black;
      margin: 0 2px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #customizationMenu {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 360px;
      padding-bottom: 20px;
    }

    button#drawBtn, button#downloadBtn, button#randomizeBtn {
      background: #00ffff;
      color: black;
    }

    @media (max-width: 400px) {
      #canvasContainer {
        width: 90vw;
        height: 90vw;
      }
      .menu-row label {
        width: 60px;
        font-size: 0.9em;
      }
      .menu-row .option-btn {
        width: 30px;
        height: 30px;
      }
    }
  </style>
</head>
<body>

<h1>PIXGEN</h1>

<!-- Step 1: Canvas Size -->
<div class="step active" id="step1">
  <h2>Select Canvas Size</h2>
  <select id="canvasSizeSelect">
    <option value="8">8 x 8</option>
    <option value="16" selected>16 x 16</option>
    <option value="32">32 x 32</option>
    <option value="64">64 x 64</option>
    <option value="128">128 x 128</option>
  </select>
  <br>
  <button onclick="nextStep(1)">Next</button>
</div>

<!-- Step 2: Body Type -->
<div class="step" id="step2">
  <h2>Select Body Type</h2>
  <select id="bodySelect">
    <option value="0">Body 1</option>
    <option value="1">Body 2</option>
    <option value="2">Body 3</option>
  </select>
  <br>
  <button onclick="nextStep(2)">Next</button>
</div>

<!-- Step 3: Customization -->
<div class="step" id="step3">
  <div id="canvasContainer">
    <canvas id="pixelCanvas" width="256" height="256"></canvas>
  </div>

  <div id="customizationMenu">

    <!-- RANDOMIZE Button and Grid Toggle -->
    <div style="margin:10px;">
      <button id="randomizeBtn">RANDOMIZE</button>
      <label style="margin-left:10px;">
        <input type="checkbox" id="gridToggle" checked> Show Grid
      </label>
    </div>

    <!-- HAIR -->
    <div class="menu-row" id="hairRow">
      <label>HAIR</label>
      <div class="option-btn" onclick="selectOption('hair',0)"></div>
      <div class="option-btn" onclick="selectOption('hair',1)"></div>
      <div class="option-btn" onclick="selectOption('hair',2)"></div>
      <div class="option-btn" onclick="selectOption('hair',3)"></div>
      <div class="option-btn" onclick="selectOption('hair',4)"></div>
      <div class="option-btn" onclick="selectOption('hair',5)"></div>
      <div class="option-btn" onclick="selectOption('hair',6)"></div>
    </div>

    <!-- EYES -->
    <div class="menu-row" id="eyesRow">
      <label>EYES</label>
      <div class="option-btn" onclick="selectOption('eyes',0)"></div>
      <div class="option-btn" onclick="selectOption('eyes',1)"></div>
      <div class="option-btn" onclick="selectOption('eyes',2)"></div>
      <div class="option-btn" onclick="selectOption('eyes',3)"></div>
      <div class="option-btn" onclick="selectOption('eyes',4)"></div>
      <div class="option-btn" onclick="selectOption('eyes',5)"></div>
      <div class="option-btn" onclick="selectOption('eyes',6)"></div>
    </div>

    <div class="menu-row" id="topRow">

      <div class="option-btn" onclick="selectOption('top',0)"></div>
